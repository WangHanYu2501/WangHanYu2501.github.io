<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书网站</title>
    <link rel="stylesheet" href="./css/lab2-01-024-index.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="img/0cb339238c60957981f4596f8a55c247~tplv-be4g95zd3a-image.jpeg">
        </div>
        <div class="nav">
            <ul>
                <li><a href="#">排行榜</a></li>
                <li><a href="#">新书上市</a></li>
                <li><a href="#">热门推荐</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">首页</a></li>
            </ul>
        </div>
    </div>
    <div class="container">
        <div class="left-sidebar">
            <h1>图书分类</h1>
            <ul>
                <li><a href="#">文学小说</a></li>
                <li><a href="#">历史传记</a></li>
                <li><a href="#">诗词歌赋</a></li>
                <li><a href="#">科幻小说</a></li>
                <li><a href="#">儿童读物</a></li>
            </ul>
        </div>
        <div class="main-content">
            <h3>图书展示区</h3>
            <div class="book-showcase">
                <div class="book-item">
                    <div class="cover">
                        <img src="img/7575dbc7819319c83167d366670f54e8~tplv-be4g95zd3a-image.jpeg">
                        <p>深入理解计算机系统</p>
                        <div class="info">点击查看</div>
                    </div>
                    <div class="cover">
                        <img src="img/4e54897c31f11e1cfe342646177a26f7~tplv-be4g95zd3a-image.jpeg">
                        <p>数据库系统概念</p>
                        <div class="info">点击查看</div>
                    </div>
                    <div class="cover">
                        <img src="img/4e5fc2d0f556d93a4d6bb3c346eff7c4~tplv-be4g95zd3a-image.jpeg">
                        <p>算法导论</p>
                        <div class="info">点击查看</div>
                    </div>
                </div>
            </div>
            <div class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="book-list">
                    <div class="book">
                        <img src="img/9adcb9c2895d174984c87ee0c242f9b5~tplv-be4g95zd3a-image.jpeg" alt="活着">
                        <p>《活着》余华</p>
                    </div>
                    <div class="book">
                        <img src="img/51579bde8c1ebaff185ce601d5b7c297~tplv-be4g95zd3a-image.jpeg" alt="三体">
                        <p>《三体》刘慈欣</p>
                    </div>
                    <div class="book">
                        <img src="img/5a4d973fd4fa2c9e3afbda5ec9f7383a~tplv-be4g95zd3a-image.jpeg" alt="三国演义">
                        <p>《三国演义》罗贯中</p>
                    </div>
                </div>
            </div>
            <h3>新书上市</h3>
            <div class="new-books">
                <table>
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>价格</th>
                    </tr>
                    <tr>
                        <td>《咸的玩笑》</td>
                        <td>刘震云</td>
                        <td>69元</td>
                    </tr>
                    <tr>
                        <td>《好猫八不》</td>
                        <td>王朔</td>
                        <td>68元</td>
                    </tr>
                    <tr>
                        <td>《刮风下雨》</td>
                        <td>李静睿</td>
                        <td>58元</td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="right-sidebar">
            <h3>限时促销</h3>
            <div class="promote-sale">
                <p>全场满100减20</p>
            </div>
            <div class="promote-sale">
                <p>限时秒杀图书低至5折</p>
            </div>
            <div class="promote-sale">
                <p>会员享超低价</p>
            </div>
        </div>
    </div>
</body>
</html>
